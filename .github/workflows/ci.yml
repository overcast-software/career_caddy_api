name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Lint and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: job_hunting_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d job_hunting_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    env:
      DEBUG: 'False'
      SECRET_KEY: test-secret-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_hunting_ci
      TEST_DB_NAME: job_hunting_ci
      SA_SCHEMA_ON_POST_MIGRATE: 'True'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Wait for Postgres
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d job_hunting_ci && break
            echo "Postgres not ready yet..."
            sleep 2
          done

      - name: Run tests
        run: |
          uv run python manage.py migrate --noinput
          uv run python manage.py test -v 2
